// ═══════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════
let AC=null;
function getAC(){
  if(!AC) AC=new(window.AudioContext||window.webkitAudioContext)();
  if(AC.state==='suspended') AC.resume();
  return AC;
}
function beep(freq,dur,type='square',vol=0.18,delay=0){
  try{
    const ac=getAC(), o=ac.createOscillator(), g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type; o.frequency.value=freq;
    const t=ac.currentTime+delay;
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol,t+0.01);
    g.gain.exponentialRampToValueAtTime(0.001,t+dur);
    o.start(t); o.stop(t+dur+0.02);
  }catch(e){}
}
function playJump(){beep(350,0.08,'square',0.15);beep(500,0.08,'square',0.12,0.06);}
function playCoin(){beep(988,0.05,'sine',0.2);beep(1319,0.1,'sine',0.18,0.05);}
function playBump(){beep(180,0.08,'square',0.18);}
function playBreak(){beep(150,0.06,'sawtooth',0.15);beep(100,0.06,'sawtooth',0.12,0.04);}
function playPowerup(){[392,494,587,784].forEach((f,i)=>beep(f,0.1,'sine',0.2,i*0.1));}
function playStomp(){beep(220,0.06,'square',0.2);beep(110,0.08,'square',0.15,0.04);}
function playDie(){[494,440,370,330,294,247,220,185].forEach((f,i)=>beep(f,0.08,'square',0.15,i*0.07));}
function playLevelClear(){

  melody.forEach((f,i)=>beep(f,0.15,'sine',0.2,i*0.14));
}
function playTheme(){

  const m=[330,330,0,330,0,262,330,0,392,0,0,196];

// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════

// ═══════════════════════════════════════════════════

    add(x,13,GROUND); add(x,12,GROUND);
  }
  // Blocks row 9 near start
  add(16,9,BRICK);add(17,9,QBLOCK,{coin:true});add(18,9,BRICK);
  add(19,9,QBLOCK,{star:true});add(20,9,BRICK);add(21,9,BRICK);
  // High blocks
  add(22,5,QBLOCK,{coin:true});
  add(16,5,BRICK);add(17,5,BRICK);add(18,5,BRICK);
  // Pipe 1 h=2
  add(28,12,PIPE_BL);add(29,12,PIPE_BR);add(28,11,PIPE_TL);add(29,11,PIPE_TR);
  // Pipe 2 h=3
  add(38,12,PIPE_BL);add(39,12,PIPE_BR);
  add(38,11,PIPE_BL);add(39,11,PIPE_BR);
  add(38,10,PIPE_TL);add(39,10,PIPE_TR);
  // Pipe 3 h=4
  add(46,12,PIPE_BL);add(47,12,PIPE_BR);
  add(46,11,PIPE_BL);add(47,11,PIPE_BR);
  add(46,10,PIPE_BL);add(47,10,PIPE_BR);
  add(46,9,PIPE_TL);add(47,9,PIPE_TR);
  // Mid blocks
  add(57,9,BRICK);add(58,9,BRICK);add(59,9,QBLOCK,{coin:true});add(60,9,BRICK);
  add(64,5,QBLOCK,{coin:true});add(65,5,BRICK);add(66,5,BRICK);add(67,5,QBLOCK,{coin:true});
  // After gap
  add(78,9,BRICK);add(79,9,QBLOCK,{coin:true});add(80,9,BRICK);
  add(84,7,QBLOCK,{coin:true});add(85,7,BRICK);add(86,7,BRICK);
  // Pipe 4
  add(95,12,PIPE_BL);add(96,12,PIPE_BR);add(95,11,PIPE_TL);add(96,11,PIPE_TR);
  // More blocks
  add(100,9,BRICK);add(101,9,QBLOCK,{coin:true});add(102,9,BRICK);
  add(108,7,QBLOCK,{coin:true});add(109,7,BRICK);
  add(115,9,BRICK);add(116,9,BRICK);add(117,9,QBLOCK,{coin:true});
  add(122,7,QBLOCK,{coin:true});add(123,7,BRICK);add(124,7,BRICK);add(125,7,QBLOCK,{coin:true});
  // Staircase at end
  for(let s=0;s<8;s++) for(let r=0;r<=s;r++) add(170+s,12-r,GROUND);
  return tiles;
}

function makeLevel2(){
  const tiles=[];
  const add=(x,y,t,extra={})=>tiles.push({x,y,t,...extra});
  // Ceiling
  for(let x=0;x<185;x++){add(x,0,GROUND);add(x,1,GROUND);}
  // Floor
  for(let x=0;x<185;x++){add(x,13,GROUND);add(x,12,GROUND);}
  // Platforms
  [5,6,7,8,9].forEach(x=>add(x,9,x===7?QBLOCK:BRICK,x===7?{coin:true}:{}));
  [15,16,17,18].forEach(x=>add(x,7,x===15||x===18?QBLOCK:BRICK,x===15||x===18?{coin:true}:{}));
  [25,26,27].forEach(x=>add(x,9,BRICK));
  [35,36,37].forEach(x=>add(x,7,x===35||x===36?QBLOCK:BRICK,x===35||x===36?{coin:true}:{}));
  [45,46,47].forEach(x=>add(x,9,x===46?QBLOCK:BRICK,x===46?{coin:true}:{}));
  [55,56,57,58,59].forEach(x=>add(x,6,x===57?QBLOCK:BRICK,x===57?{coin:true}:{}));
  [65,66,67,68].forEach(x=>add(x,9,x===65||x===68?QBLOCK:BRICK,x===65||x===68?{coin:true}:{}));
  [75,76,77].forEach(x=>add(x,7,x===76?QBLOCK:BRICK,x===76?{coin:true}:{}));
  [85,86,87,88].forEach(x=>add(x,9,BRICK));
  [95,96].forEach(x=>add(x,7,QBLOCK,{coin:true}));
  [105,106,107].forEach(x=>add(x,9,x===107?QBLOCK:BRICK,x===107?{coin:true}:{}));
  [115,116,117,118].forEach(x=>add(x,6,BRICK));
  [125,126,127].forEach(x=>add(x,9,QBLOCK,{coin:true}));
  [135,136].forEach(x=>add(x,7,BRICK));
  [145,146,147,148].forEach(x=>add(x,9,x===146?QBLOCK:BRICK,x===146?{coin:true}:{}));
  // Pipe
  add(155,12,PIPE_BL);add(156,12,PIPE_BR);add(155,11,PIPE_BL);add(156,11,PIPE_BR);add(155,10,PIPE_TL);add(156,10,PIPE_TR);
  // Exit staircase
  for(let s=0;s<6;s++) for(let r=0;r<=s;r++) add(165+s,12-r,GROUND);
  return tiles;
}

// ═══════════════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════════════
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const gw=document.getElementById('gw');
let W=0,H=0,SC=1; // SC = pixel scale factor

function resize(){
  W=gw.clientWidth; H=gw.clientHeight;
  canvas.width=W; canvas.height=H;
  SC=H/(ROWS*T);
}
window.addEventListener('resize',resize); resize();

// ═══════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════
let gState='menu'; // menu playing dead clear gameover
let score=0,coins=0,lives=3,lvlIdx=0;
let timeLeft=400,timeTick=0;
let camX=0;
let tmap={};  // key:"x,y" → tile obj
let enemies=[],coinSpr=[],particles=[];
let animT=0;

// ─── PLAYER ─────────────────────────────────────
const P={
  x:2.5*T, y:9*T,   // position (px)
  vx:0, vy:0,       // velocity
  w:T*0.72, h:T*0.9,
  onGround:false,
  big:false,
  dead:false,
  invTimer:0,
  deathTimer:0,
  facing:1,
  walkF:0, walkT:0,
};

// ─── INPUT ──────────────────────────────────────
const K={L:false,R:false,D:false,J:false};
let jumpDown=false, jumpHeld=false;

// ═══════════════════════════════════════════════════
// LEVEL LOADER
// ═══════════════════════════════════════════════════
function loadLevel(idx){
  lvlIdx=idx%LEVELS.length;
  const lv=LEVELS[lvlIdx];
  // Build tile map
  tmap={};
  lv.tiles.forEach(t=>{ tmap[`${t.x},${t.y}`]={...t,used:false}; });
  // Enemies
  enemies=lv.enemies.map(e=>({
    type:e.type, x:e.tx*T, y:e.ty*T,
    vx:-1.0, vy:0, onGround:false,
    w:T*0.75, h:T*0.75,
    dead:false, stomped:false, stompT:0,
    shell:false,
    walkF:0, walkT:0,
  }));
  // Coins
  coinSpr=lv.coins.map(c=>({x:c.tx*T+T/2,y:c.ty*T+T/2,taken:false}));
  // Player
  P.x=2.5*T; P.y=8*T; P.vx=0; P.vy=0;
  P.dead=false; P.onGround=false; P.invTimer=0; P.deathTimer=0; P.big=false;
  camX=0; timeLeft=lv.time; timeTick=0; particles=[];
  document.getElementById('hw').textContent=lv.id;
  updateHUD();
}

// ═══════════════════════════════════════════════════
// TILE HELPERS
// ═══════════════════════════════════════════════════
function gt(tx,ty){ return tmap[`${tx},${ty}`]; }
function solid(tx,ty){
  const t=gt(tx,ty); if(!t||t.t===AIR) return false;
  return true; // all stored tiles are solid
}
// Tile coords of a pixel position
function tc(px){ return Math.floor(px/T); }

// ═══════════════════════════════════════════════════
// PHYSICS — solid, no tunneling
// ═══════════════════════════════════════════════════
const GRAV=0.5, MAXFALL=12, PSPEED=3.0, JFORCE=-12.5;

function stepEntity(e){
  // ── HORIZONTAL ──────────────────────────────────
  e.x += e.vx;
  resolveH(e);
  // ── VERTICAL ────────────────────────────────────
  e.vy = Math.min(e.vy+GRAV, MAXFALL);
  e.y += e.vy;
  e.onGround=false;
  resolveV(e);
}

function resolveH(e){
  // Left wall
  const txL=tc(e.x), txR=tc(e.x+e.w-1);
  const tyT=tc(e.y+2), tyB=tc(e.y+e.h-2);
  if(e.vx<0){
    if(solid(txL,tyT)||solid(txL,tyB)){
      e.x=( txL+1)*T;
      if(e!==P) e.vx=-e.vx;
      else e.vx=0;
    }
  } else if(e.vx>0){
    if(solid(txR,tyT)||solid(txR,tyB)){
      e.x=txR*T-e.w;
      if(e!==P) e.vx=-e.vx;
      else e.vx=0;
    }
  }
}

function resolveV(e){
  const txL=tc(e.x+2), txR=tc(e.x+e.w-2);
  if(e.vy>0){
    // Falling — check feet
    const tyB=tc(e.y+e.h-1);
    if(solid(txL,tyB)||solid(txR,tyB)){
      e.y=tyB*T-e.h;
      e.vy=0; e.onGround=true;
    }
  } else if(e.vy<0){
    // Rising — check head
    const tyT=tc(e.y);
    if(solid(txL,tyT)||solid(txR,tyT)){
      e.y=(tyT+1)*T;
      e.vy=0;
      // Only for player: hit block
      if(e===P){
        hitBlock(txL,tyT)||hitBlock(txR,tyT);
      }
    }
  }
}

function hitBlock(tx,ty){
  const t=gt(tx,ty); if(!t) return false;
  if(t.t===QBLOCK&&!t.used){
    t.used=true;
    // Pop animation
    addPop(tx*T+T/2, ty*T, t.coin?'🪙':t.star?'⭐':'+');
    if(t.coin){ score+=100; coins++; playCoin(); }
    else if(t.star){ P.big=true; addPop(tx*T+T/2,ty*T,'💪'); playPowerup(); }
    // Change to used block
    tmap[`${tx},${ty}`]={x:tx,y:ty,t:USED,used:true};
    return true;
  }
  if(t.t===BRICK){
    if(P.big){
      delete tmap[`${tx},${ty}`];
      spawnBricks(tx*T,ty*T); score+=50; playBreak();
    } else { playBump(); addPop(tx*T+T/2,ty*T,''); }
    return true;
  }
  return false;
}

// ═══════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════
function addPop(x,y,text){
  particles.push({type:'pop',x,y,vy:-2.5,life:50,ml:50,text});
}
function spawnBricks(x,y){
  for(let i=0;i<6;i++){
    const a=(i/6)*Math.PI*2;
    particles.push({type:'brick',x:x+T/2,y:y+T/2,
      vx:Math.cos(a)*3,vy:Math.sin(a)*3.5-2,life:35,ml:35});
  }
}
function spawnStars(x,y){
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2;
    particles.push({type:'star',x,y,vx:Math.cos(a)*2.5,vy:Math.sin(a)*2-1.5,life:30,ml:30});
  }
}

// ═══════════════════════════════════════════════════
// UPDATE
// ═══════════════════════════════════════════════════
function update(){
  if(gState!=='playing'&&gState!=='clear') return;
  const lv=LEVELS[lvlIdx];

  // Time
  timeTick++;
  if(timeTick>=60){ timeTick=0; timeLeft=Math.max(0,timeLeft-1);
    if(timeLeft===0&&!P.dead) killPlayer(); }

  // ── PLAYER ──────────────────────────────────────
  if(!P.dead){
    // Horizontal input
    if(K.L){ P.vx=Math.max(P.vx-0.6,-PSPEED); P.facing=-1; }
    else if(K.R){ P.vx=Math.min(P.vx+0.6, PSPEED); P.facing=1; }
    else {
      // Friction
      if(P.onGround) P.vx*=0.72;
      else P.vx*=0.92;
      if(Math.abs(P.vx)<0.1) P.vx=0;
    }

    // Jump — only when freshly pressed AND on ground
    if(jumpDown&&P.onGround){
      P.vy=JFORCE*(P.big?1.05:1);
      P.onGround=false;
      jumpDown=false;
      playJump();
    }
    jumpDown=false; // consume

    // Variable jump height: let go early = lower jump
    if(!jumpHeld&&P.vy<-4) P.vy+=1.5;

    // Step
    stepEntity(P);

    // Walk anim
    if(Math.abs(P.vx)>0.3){
      P.walkT+=Math.abs(P.vx)*0.12;
      if(P.walkT>=1){ P.walkT=0; P.walkF=(P.walkF+1)%4; }
    } else P.walkF=0;

    // Invincibility
    if(P.invTimer>0) P.invTimer--;

    // World bounds
    P.x=Math.max(0,P.x);
    if(P.x>lv.W*T-P.w) P.x=lv.W*T-P.w;
    // Death pit
    if(P.y>ROWS*T+80) killPlayer();

    // Enemy collisions
    if(P.invTimer===0){
      enemies.forEach(e=>{
        if(e.dead||e.stomped) return;
        if(!overlap(P,e)) return;
        // Stomp check: player falling AND foot above enemy center
        const stomping = P.vy>0 && (P.y+P.h) < (e.y+e.h*0.55);
        if(stomping){
          stompEnemy(e);
          P.vy=-8; // bounce up
        } else {
          if(P.big){ P.big=false; P.invTimer=140; playBump(); }
          else killPlayer();
        }
      });
    }

    // Coins
    coinSpr.forEach(c=>{
      if(c.taken) return;
      if(Math.abs(c.x-P.x-P.w/2)<T*0.7&&Math.abs(c.y-P.y-P.h/2)<T*0.7){
        c.taken=true; score+=200; coins++; playCoin();
        addPop(c.x,c.y-T,'🪙');
      }
    });

    // Camera: center on player, clamp to level
    const targetCam=P.x-W/SC/2+P.w/2;
    camX=Math.max(0,Math.min(targetCam,(lv.W-Math.ceil(W/SC/T)-1)*T));

    // Flag pole / level end
    if(lv.flagX&&P.x+P.w>lv.flagX*T) levelClear();

  } else {
    // Death arc
    P.deathTimer++;
    if(P.deathTimer===1){ P.vy=-13; P.vx=0; }
    else P.vy=Math.min(P.vy+0.6,14);
    P.y+=P.vy;
    if(P.deathTimer>110) afterDeath();
  }

  // ── ENEMIES ──────────────────────────────────────
  enemies.forEach(e=>{
    if(e.dead) return;
    if(e.stomped){ e.stompT++; if(e.stompT>40) e.dead=true; return; }
    // Only simulate near player
    if(Math.abs(e.x-P.x)>W/SC+T*4) return;
    // Walk anim
    e.walkT=(e.walkT||0)+Math.abs(e.vx)*0.12;
    if(e.walkT>=1){ e.walkT=0; e.walkF=(e.walkF+1)%2; }
    stepEntity(e);
    if(e.y>ROWS*T+T) e.dead=true;
  });

  // ── PARTICLES ────────────────────────────────────
  particles.forEach(p=>{
    p.x+=(p.vx||0); p.y+=p.vy||0; p.vy=(p.vy||0)+0.25; p.life--;
  });
  particles=particles.filter(p=>p.life>0);

  updateHUD();
}

function overlap(a,b){
  return a.x+2<b.x+b.w-2 && a.x+a.w-2>b.x+2 && a.y+2<b.y+b.h-2 && a.y+a.h-2>b.y+2;
}

function stompEnemy(e){
  playStomp(); score+=200;
  if(e.type==='koopa'&&!e.shell){ e.shell=true; e.vx=0; e.h=T*0.45; e.y+=T*0.3; }
  else { e.stomped=true; e.stompT=0; e.h=T*0.18; spawnStars(e.x+e.w/2,e.y); }
  addPop(e.x+e.w/2,e.y,'200');
}

function killPlayer(){
  if(P.dead) return;
  P.dead=true; P.deathTimer=0; lives--; playDie();
}

function afterDeath(){
  if(lives<=0){ gState='gameover'; showScr('GAME OVER','',()=>{ lives=3;score=0;coins=0;loadLevel(0);gState='playing'; }); }
  else { loadLevel(lvlIdx); gState='playing'; }
}

function levelClear(){
  if(gState==='clear') return;
  gState='clear'; playLevelClear();
  score+=timeLeft*10;
  setTimeout(()=>{ lvlIdx=(lvlIdx+1)%LEVELS.length; loadLevel(lvlIdx); gState='playing'; },3000);
}

// ═══════════════════════════════════════════════════
// DRAW
// ═══════════════════════════════════════════════════
function draw(){
  const lv=LEVELS[lvlIdx];
  // Sky
  if(lv.bg==='cave'){ ctx.fillStyle='#000018'; ctx.fillRect(0,0,W,H); }
  else {
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#3060cc'); g.addColorStop(1,COL.sky);
    ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  }

  ctx.save();
  ctx.scale(SC,SC);
  ctx.translate(-camX,0);

  // Decorations
  if(lv.bg!=='cave') lv.decos.forEach(d=>{
    if(d.x*T<camX-T*4||d.x*T>camX+W/SC+T*6) return;
    if(d.type==='cloud') dCloud(d.x*T,d.y*T,d.s);
    else if(d.type==='hill') dHill(d.x*T,d.y*T,d.s);
    else if(d.type==='bush') dBush(d.x*T,d.y*T,d.s);
  });

  // Tiles
  const tx0=Math.max(0,tc(camX)-1), tx1=Math.min(lv.W,tc(camX+W/SC)+3);
  for(let ty=0;ty<ROWS;ty++)
    for(let tx=tx0;tx<tx1;tx++){
      const t=gt(tx,ty); if(t) dTile(t,tx,ty);
    }

  // Floating coins
  coinSpr.forEach(c=>{
    if(c.taken) return;
    if(c.x<camX-T||c.x>camX+W/SC+T) return;
    dCoin(c.x,c.y);
  });

  // Enemies
  enemies.forEach(e=>{ if(!e.dead&&e.x>camX-T*2&&e.x<camX+W/SC+T*2) dEnemy(e); });

  // Player
  if(!P.dead||P.deathTimer<100){
    const blink=P.invTimer>0&&Math.floor(P.invTimer/5)%2;
    if(!blink) dPlayer(P);
  }

  // Flag pole
  if(lv.flagX){
    const fx=lv.flagX*T;
    ctx.fillStyle='#aaa'; ctx.fillRect(fx+T*0.44,2*T,T*0.08,11*T);
    const fy=2*T+Math.sin(animT*2)*T*0.12;
    ctx.fillStyle='#e82020'; ctx.beginPath();
    ctx.moveTo(fx+T*0.44,fy); ctx.lineTo(fx+T*1.1,fy+T*0.35); ctx.lineTo(fx+T*0.44,fy+T*0.7); ctx.fill();
    // Castle
    ctx.fillStyle='#aaa';
    ctx.fillRect(fx+T*0.5,11*T,T*3,T*2);
    for(let i=0;i<3;i++) ctx.fillRect(fx+T*0.5+i*T,10*T,T*0.8,T*0.9);
  }

  // Particles
  ctx.save();
  particles.forEach(p=>{
    const a=p.life/p.ml;
    ctx.globalAlpha=Math.min(1,a*1.5);
    if(p.type==='pop'){
      ctx.fillStyle='#fff'; ctx.font=`bold ${T*0.55}px Courier`;
      ctx.textAlign='center'; ctx.fillText(p.text||'',p.x,p.y);
    } else if(p.type==='brick'){
      ctx.fillStyle=COL.brk; ctx.fillRect(p.x-5,p.y-4,10,8);
    } else if(p.type==='star'){
      ctx.fillStyle=COL.coin; ctx.beginPath();
      ctx.arc(p.x,p.y,T*0.18,0,Math.PI*2); ctx.fill();
    }
  });
  ctx.restore();
  ctx.restore();
}

// ─── TILE DRAW ────────────────────────────────────
function dTile(t,tx,ty){
  const x=tx*T,y=ty*T;
  if(t.t===GROUND){
    ctx.fillStyle=COL.gnd; ctx.fillRect(x,y,T,T);
    ctx.fillStyle=COL.gndT; ctx.fillRect(x,y,T,T*0.28);
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.fillRect(x,y+T*0.28,T,1.5); ctx.fillRect(x+T/2,y+T*0.28,1.5,T*0.72);
    ctx.fillRect(x,y+T*0.64,T,1.5);
  } else if(t.t===BRICK){
    ctx.fillStyle=COL.brk; ctx.fillRect(x,y,T,T);
    ctx.fillStyle=COL.brkL;
    ctx.fillRect(x,y+T*0.5-1,T,2); ctx.fillRect(x+T*0.5-1,y,2,T*0.5);
    ctx.fillRect(x,y+T*0.5+1,2,T*0.5-1); ctx.fillRect(x+T*0.5+1,y+T*0.5+1,T*0.5-1,T*0.5-1);
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.fillRect(x+2,y+2,T*0.45,T*0.46); ctx.fillRect(x+T*0.52,y+T*0.52,T*0.45,T*0.46);
  } else if(t.t===QBLOCK){
    const bob=t.used?0:Math.sin(animT*4)*1.2;
    ctx.fillStyle=COL.qbl; ctx.fillRect(x,y+bob,T,T);
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.fillRect(x,y+bob,T,2); ctx.fillRect(x,y+bob,2,T);
    ctx.fillRect(x+T-2,y+bob,2,T); ctx.fillRect(x,y+T+bob-2,T,2);
    ctx.fillStyle='#fff'; ctx.font=`bold ${T*0.62}px Arial`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('?',x+T/2,y+T/2+bob);
  } else if(t.t===USED){
    ctx.fillStyle='#7a5818'; ctx.fillRect(x,y,T,T);
    ctx.fillStyle='rgba(0,0,0,0.4)';
    ctx.fillRect(x,y,T,2); ctx.fillRect(x,y,2,T); ctx.fillRect(x+T-2,y,2,T); ctx.fillRect(x,y+T-2,T,2);
  } else if(t.t===PIPE_TL||t.t===PIPE_TR){
    // Pipe top row — slightly wider
    const isL=t.t===PIPE_TL;
    ctx.fillStyle=COL.pip; ctx.fillRect(x-(isL?4:0),y,T+(isL?4:4),T);
    if(isL){ ctx.fillStyle=COL.pipD; ctx.fillRect(x-4,y+4,6,T-8); }
    ctx.fillStyle=COL.pipL;
    if(isL) ctx.fillRect(x+T*0.22,y+T*0.12,T*0.22,T*0.76);
  } else if(t.t===PIPE_BL||t.t===PIPE_BR){
    const isL=t.t===PIPE_BL;
    ctx.fillStyle=COL.pip; ctx.fillRect(x,y,T,T);
    if(isL){ ctx.fillStyle=COL.pipD; ctx.fillRect(x,y,4,T); }
    ctx.fillStyle=COL.pipL;
    if(isL) ctx.fillRect(x+T*0.22,y,T*0.22,T);
  }
}

// ─── PLAYER DRAW ──────────────────────────────────
function dPlayer(p){
  const x=p.x, y=p.y, w=p.w, h=p.h, f=p.facing, big=p.big;
  ctx.save();
  if(f===-1){ ctx.translate(x+w/2,0); ctx.scale(-1,1); ctx.translate(-(x+w/2),0); }
  // Hat (red)
  ctx.fillStyle=COL.ph;
  ctx.fillRect(x+w*0.1, y, w*0.8, h*0.22);        // top
  ctx.fillRect(x-w*0.05, y+h*0.1, w*1.1, h*0.18); // brim
  // Face
  ctx.fillStyle=COL.ps;
  ctx.fillRect(x+w*0.05, y+h*0.22, w*0.9, h*0.34);
  // Hair / sideburn
  ctx.fillStyle='#7a3800';
  ctx.fillRect(x+w*0.05, y+h*0.22, w*0.12, h*0.12);
  // Eyes
  ctx.fillStyle='#000';
  ctx.fillRect(x+w*0.52, y+h*0.26, w*0.2, h*0.12);
  // Nose
  ctx.fillStyle=COL.ps;
  ctx.beginPath(); ctx.arc(x+w*0.6,y+h*0.42,w*0.14,0,Math.PI*2); ctx.fill();
  // Mustache
  ctx.fillStyle='#7a3800';
  ctx.fillRect(x+w*0.18, y+h*0.40, w*0.64, h*0.1);
  // Body / overalls
  ctx.fillStyle=COL.po;
  ctx.fillRect(x+w*0.04, y+h*0.56, w*0.92, h*0.34);
  // Overall buttons
  ctx.fillStyle='#fff';
  ctx.fillRect(x+w*0.22,y+h*0.58,w*0.1,h*0.08);
  ctx.fillRect(x+w*0.68,y+h*0.58,w*0.1,h*0.08);
  // Legs
  const lOff=(p.walkF===1||p.walkF===3)?h*0.1:0;
  ctx.fillStyle=COL.po;
  ctx.fillRect(x+w*0.04, y+h*0.84, w*0.4, h*0.16+lOff);
  ctx.fillRect(x+w*0.56, y+h*0.84, w*0.4, h*0.16+(lOff?0:h*0.08));
  // Shoes
  ctx.fillStyle='#5b3000';
  ctx.fillRect(x-w*0.02, y+h*0.9+lOff, w*0.46, h*0.1);
  ctx.fillRect(x+w*0.54, y+h*0.9, w*0.46, h*0.1);
  // Big glow
  if(big){
    ctx.strokeStyle='rgba(255,200,50,0.5)'; ctx.lineWidth=3;
    ctx.strokeRect(x-2,y-2,w+4,h+4);
  }
  ctx.restore();
}

// ─── ENEMY DRAW ───────────────────────────────────
function dEnemy(e){
  if(e.stomped){
    ctx.fillStyle=e.type==='goomba'?COL.gb:COL.kp;
    ctx.fillRect(e.x,e.y+e.h*0.4,e.w,e.h*0.6); return;
  }
  const x=e.x,y=e.y,w=e.w,h=e.h;
  if(e.type==='goomba'){
    ctx.fillStyle=COL.gb;
    ctx.beginPath(); ctx.ellipse(x+w/2,y+h*0.55,w*0.5,h*0.55,0,0,Math.PI*2); ctx.fill();
    // Eyes
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(x+w*0.26,y+h*0.34,w*0.16,h*0.2,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x+w*0.74,y+h*0.34,w*0.16,h*0.2,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000';
    ctx.beginPath(); ctx.arc(x+w*0.28,y+h*0.34,w*0.09,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x+w*0.72,y+h*0.34,w*0.09,0,Math.PI*2); ctx.fill();
    // Eyebrows
    ctx.strokeStyle='#000'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(x+w*0.14,y+h*0.2); ctx.lineTo(x+w*0.4,y+h*0.26); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+w*0.6,y+h*0.26); ctx.lineTo(x+w*0.86,y+h*0.2); ctx.stroke();
    // Feet (walk anim)
    const fOff=e.walkF===0?h*0.06:0;
    ctx.fillStyle=COL.gbD;
    ctx.fillRect(x+w*0.04,y+h*0.75+fOff,w*0.36,h*0.25);
    ctx.fillRect(x+w*0.6, y+h*0.75+(fOff?0:h*0.06),w*0.36,h*0.25);
  } else {
    if(e.shell){
      ctx.fillStyle=COL.kp;
      ctx.beginPath(); ctx.ellipse(x+w/2,y+h/2,w*0.5,h*0.5,0,0,Math.PI*2); ctx.fill();
      ctx.strokeStyle=COL.kpD; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(x+w/2,y+h/2,w*0.32,h*0.32,0,0,Math.PI*2); ctx.stroke();
      return;
    }
    // Shell
    ctx.fillStyle=COL.kp;
    ctx.beginPath(); ctx.ellipse(x+w/2,y+h*0.65,w*0.46,h*0.45,0,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=COL.kpD; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.ellipse(x+w/2,y+h*0.65,w*0.3,h*0.28,0,0,Math.PI*2); ctx.stroke();
    // Head
    ctx.fillStyle=COL.kpS;
    ctx.beginPath(); ctx.ellipse(x+w*0.58,y+h*0.24,w*0.3,h*0.26,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#000'; ctx.beginPath(); ctx.arc(x+w*0.67,y+h*0.19,w*0.08,0,Math.PI*2); ctx.fill();
    // Feet
    ctx.fillStyle=COL.kpS;
    ctx.fillRect(x+w*0.08,y+h*0.82,w*0.3,h*0.18);
    ctx.fillRect(x+w*0.62,y+h*0.82,w*0.3,h*0.18);
  }
}

// ─── COIN / DECO ─────────────────────────────────
function dCoin(x,y){
  const sq=Math.max(0.15,Math.abs(Math.sin(animT*3+x*0.05)));
  ctx.fillStyle=COL.coin;
  ctx.beginPath(); ctx.ellipse(x,y,T*0.22*sq,T*0.28,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,255,200,0.55)';
  ctx.beginPath(); ctx.ellipse(x-T*0.03*sq,y-T*0.05,T*0.08*sq,T*0.1,0,0,Math.PI*2); ctx.fill();
}
function dCloud(x,y,s){
  const r=T*s*0.5; const cx=x+r, cy=y+T;
  ctx.fillStyle='rgba(255,255,255,0.94)';
  ctx.beginPath();
  ctx.arc(cx,cy,r*0.55,0,Math.PI*2);
  ctx.arc(cx+r*0.55,cy+r*0.12,r*0.42,0,Math.PI*2);
  ctx.arc(cx-r*0.45,cy+r*0.15,r*0.38,0,Math.PI*2);
  ctx.fill();
  ctx.fillRect(cx-r*0.88,cy+r*0.38,r*1.76,r*0.3);
}
function dHill(x,y,s){
  const r=T*s; ctx.fillStyle=COL.hill;
  ctx.beginPath(); ctx.arc(x+r,y+T,r,Math.PI,0); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.arc(x+r*0.7,y+T*0.75,r*0.22,0,Math.PI*2); ctx.fill();
}
function dBush(x,y,s){
  const r=T*s*0.6; ctx.fillStyle=COL.bush;
  ctx.beginPath();
  ctx.arc(x+r,y+T*0.8,r*0.55,0,Math.PI*2);
  ctx.arc(x+r*1.5,y+T*0.88,r*0.4,0,Math.PI*2);
  ctx.arc(x+r*0.5,y+T*0.88,r*0.4,0,Math.PI*2);
  ctx.fill();
}

// ═══════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════
function updateHUD(){
  document.getElementById('hs').textContent=String(score).padStart(6,'0');
  document.getElementById('hc').textContent='×'+String(coins).padStart(2,'0');
  document.getElementById('ht').textContent=timeLeft;
  document.getElementById('hl').textContent='×'+String(lives).padStart(2,'0');
}
function showScr(title,body,onBtn){
  document.getElementById('screen').querySelector('h2').textContent=title;
  document.getElementById('screen').querySelector('p').textContent=body;
  document.getElementById('sbtn').onclick=()=>{ document.getElementById('screen').classList.remove('show'); if(onBtn)onBtn(); };
  document.getElementById('screen').classList.add('show');
}

// ═══════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(['ArrowLeft','KeyA'].includes(e.code)) K.L=true;
  if(['ArrowRight','KeyD'].includes(e.code)) K.R=true;
  if(['ArrowDown','KeyS'].includes(e.code)) K.D=true;
  if(['Space','ArrowUp','KeyW'].includes(e.code)&&!e.repeat){
    K.J=true; jumpDown=true; jumpHeld=true; e.preventDefault();
  }
});
document.addEventListener('keyup',e=>{
  if(['ArrowLeft','KeyA'].includes(e.code)) K.L=false;
  if(['ArrowRight','KeyD'].includes(e.code)) K.R=false;
  if(['ArrowDown','KeyS'].includes(e.code)) K.D=false;
  if(['Space','ArrowUp','KeyW'].includes(e.code)){ K.J=false; jumpHeld=false; }
});

function mkBtn(id,downFn,upFn){
  const b=document.getElementById(id);
  const dn=e=>{ e.preventDefault(); b.classList.add('active'); downFn(); };
  const up=e=>{ e.preventDefault(); b.classList.remove('active'); if(upFn)upFn(); };
  b.addEventListener('touchstart',dn,{passive:false});
  b.addEventListener('touchend',up,{passive:false});
  b.addEventListener('touchcancel',up,{passive:false});
  b.addEventListener('mousedown',dn);
  b.addEventListener('mouseup',up);
  b.addEventListener('mouseleave',up);
}
mkBtn('bleft',  ()=>K.L=true,  ()=>K.L=false);
mkBtn('bright', ()=>K.R=true,  ()=>K.R=false);
mkBtn('bdown',  ()=>K.D=true,  ()=>K.D=false);
mkBtn('bjump',  ()=>{ K.J=true; jumpDown=true; jumpHeld=true; },
                ()=>{ K.J=false; jumpHeld=false; });

// ═══════════════════════════════════════════════════
// MAIN LOOP — fixed 60fps update, draw every frame
// ═══════════════════════════════════════════════════
let lastT=0;
function loop(ts){
  animT=ts*0.001;
  // Fixed timestep: run exactly once per ~16ms bucket
  if(ts-lastT>=14){ lastT=ts; update(); }
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('load',()=>{
  setTimeout(()=>{
    resize(); loadLevel(0);
    document.getElementById('sbtn').onclick=()=>{
      document.getElementById('screen').classList.remove('show');
      gState='playing'; playTheme();
    };
    requestAnimationFrame(loop);
  },100);
});
</script>
